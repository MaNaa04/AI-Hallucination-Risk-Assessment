<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Hallucination Detector</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 320px;
      padding: 15px;
      margin: 0;
      color: #333;
    }
    h2 {
      margin-top: 0;
      font-size: 16px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 5px;
    }
    textarea {
      width: 100%;
      height: 80px;
      margin-top: 10px;
      padding: 5px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: vertical;
    }
    button {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background-color: #0056b3;
    }
    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    #result {
      margin-top: 15px;
      padding: 10px;
      border-radius: 4px;
      display: none;
    }
    .accurate { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .uncertain { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    .hallucination { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .loader {
      display: none;
      text-align: center;
      margin-top: 10px;
      color: #777;
    }
  </style>
</head>
<body>
  <h2>Is this hallucinated?</h2>
  
  <label for="ai-text">Paste or highlight AI text:</label>
  <textarea id="ai-text" placeholder="Extracting text from page..."></textarea>
  
  <button id="verify-btn">Verify Facts</button>
  
  <div class="loader" id="loader">Checking against facts...</div>
  
  <div id="result">
    <h3 id="verdict" style="margin-top: 0;"></h3>
    <p><strong>Score:</strong> <span id="score"></span>/100</p>
    <p id="explanation"></p>
    <p style="font-size: 12px; color: #555;"><i>Sources:</i> <span id="sources"></span></p>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
