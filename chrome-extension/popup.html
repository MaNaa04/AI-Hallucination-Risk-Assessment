<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TruthLens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 380px;
      background: #fafbfc;
      color: #1a1a2e;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 28px;
      height: 28px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-icon svg {
      width: 16px;
      height: 16px;
      color: white;
    }

    .header-text h1 {
      font-size: 14px;
      font-weight: 600;
      color: white;
      letter-spacing: -0.2px;
    }

    .header-text p {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      margin-top: 1px;
    }

    /* Status indicator */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 20px;
      background: #f0f4f8;
      border-bottom: 1px solid #e8ecf1;
      font-size: 11px;
      color: #5f6368;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #34c759;
      flex-shrink: 0;
    }

    .status-dot.offline {
      background: #ff3b30;
    }

    /* Main content */
    .content {
      padding: 16px 20px;
    }

    .input-label {
      font-size: 12px;
      font-weight: 500;
      color: #5f6368;
      margin-bottom: 6px;
      display: block;
    }

    textarea {
      width: 100%;
      height: 88px;
      padding: 10px 12px;
      border: 1.5px solid #dde1e6;
      border-radius: 10px;
      font-family: inherit;
      font-size: 13px;
      line-height: 1.5;
      color: #1a1a2e;
      background: white;
      resize: vertical;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    textarea:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    textarea::placeholder {
      color: #adb5bd;
      font-size: 12px;
    }

    /* Button */
    .verify-btn {
      width: 100%;
      padding: 10px 16px;
      margin-top: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      letter-spacing: 0.1px;
    }

    .verify-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.35);
    }

    .verify-btn:active {
      transform: translateY(0);
    }

    .verify-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .verify-btn svg {
      width: 14px;
      height: 14px;
    }

    /* Loader */
    .loader {
      display: none;
      padding: 20px;
      text-align: center;
    }

    .loader-spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid #e8ecf1;
      border-top: 2.5px solid #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loader-text {
      font-size: 12px;
      color: #5f6368;
    }

    /* Result card */
    #result {
      display: none;
      margin-top: 14px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #e8ecf1;
      background: white;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
    }

    .result-header.accurate {
      background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
    }

    .result-header.uncertain {
      background: linear-gradient(135deg, #fff3cd 0%, #ffeeba 100%);
    }

    .result-header.hallucination {
      background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
    }

    .verdict-text {
      font-size: 14px;
      font-weight: 600;
    }

    .result-header.accurate .verdict-text { color: #155724; }
    .result-header.uncertain .verdict-text { color: #856404; }
    .result-header.hallucination .verdict-text { color: #721c24; }

    .score-badge {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .score-badge.high { background: linear-gradient(135deg, #28a745, #20c997); }
    .score-badge.mid { background: linear-gradient(135deg, #ffc107, #ff9800); }
    .score-badge.low { background: linear-gradient(135deg, #dc3545, #c82333); }

    .result-body {
      padding: 12px 16px;
    }

    .result-explanation {
      font-size: 12px;
      color: #495057;
      line-height: 1.6;
      margin-bottom: 10px;
    }

    .result-sources {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding-top: 10px;
      border-top: 1px solid #f0f0f0;
    }

    .result-sources-label {
      font-size: 10px;
      font-weight: 600;
      color: #adb5bd;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      width: 100%;
      margin-bottom: 2px;
    }

    .source-tag {
      font-size: 11px;
      padding: 3px 8px;
      background: #f1f3f5;
      border-radius: 10px;
      color: #5f6368;
      border: 1px solid #e8ecf1;
    }

    /* Error state */
    .error-msg {
      display: none;
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      background: #fff5f5;
      border: 1px solid #fed7d7;
      font-size: 12px;
      color: #c53030;
      line-height: 1.5;
    }

    /* Footer */
    .footer {
      padding: 10px 20px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .footer-link {
      font-size: 11px;
      color: #adb5bd;
      text-decoration: none;
      transition: color 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .footer-link:hover {
      color: #667eea;
    }

    .footer-link-primary {
      color: #667eea;
      font-weight: 600;
    }

    .footer-link-primary:hover {
      color: #764ba2;
    }

    .footer-sep {
      color: #dde1e6;
      font-size: 10px;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #result {
      animation: fadeIn 0.3s ease-out;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        <path d="M9 12l2 2 4-4"></path>
      </svg>
    </div>
    <div class="header-text">
      <h1>TruthLens</h1>
      <p>Verify AI-generated claims instantly</p>
    </div>
  </div>

  <!-- Status -->
  <div class="status-bar">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">Connecting to backend...</span>
  </div>

  <!-- Content -->
  <div class="content">
    <label class="input-label" for="ai-text">Text to verify</label>
    <textarea id="ai-text" placeholder="Select text on any page and open this popup, or paste text here..."></textarea>

    <button class="verify-btn" id="verify-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        <path d="M9 12l2 2 4-4"></path>
      </svg>
      Verify Claims
    </button>

    <!-- Loader -->
    <div class="loader" id="loader">
      <div class="loader-spinner"></div>
      <div class="loader-text">Analyzing claims against multiple sources...</div>
    </div>

    <!-- Error -->
    <div class="error-msg" id="error-msg"></div>

    <!-- Result -->
    <div id="result">
      <div class="result-header" id="result-header">
        <span class="verdict-text" id="verdict"></span>
        <div class="score-badge" id="score-badge">
          <span id="score"></span>
        </div>
      </div>
      <div class="result-body">
        <p class="result-explanation" id="explanation"></p>
        <div class="result-sources">
          <span class="result-sources-label">Sources</span>
          <span id="sources"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <a href="http://localhost:8000/analytics" target="_blank" class="footer-link footer-link-primary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect><rect x="14" y="14" width="7" height="7" rx="1"></rect></svg>
      Analytics Dashboard
    </a>
    <span class="footer-sep">·</span>
    <a href="http://localhost:8000/dashboard" target="_blank" class="footer-link">
      Basic Dashboard
    </a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
